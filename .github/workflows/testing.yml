name: Testing

on:
  push:
    branches:
      - main

jobs:
  unit:
    if: false
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: pnpm install
      - name: Run preexisting unit tests
        run: pnpm test:unit
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.sha }}-preexisting
          path: coverage/
      - name: Run extended unit tests
        run: pnpm test:unit:wat
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.sha }}-extended
          path: coverage/

  integration:
    if: false
    runs-on: self-hosted
    services:
      webdav:
        image: bytemark/webdav
        ports:
          - 60080:80
        env:
          AUTH_TYPE: Basic
          USERNAME: alice
          PASSWORD: secret1234
        options: --name webdav
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Copy test data to container
        run: docker cp ./tests/integration/test-data webdav:/var/lib/dav/data/dav/
      - name: Start OpenCloud backend
        run: |
          docker rm -f opencloud || true
          docker run -d --name opencloud \
            -e OC_INSECURE=true \
            -e OC_URL=https://localhost:19200 \
            -e PROXY_ENABLE_BASIC_AUTH=true \
            -e IDM_ADMIN_PASSWORD=admin \
            -e IDM_CREATE_DEMO_USERS=true \
            -p 19200:9200 \
            --entrypoint /bin/sh \
            opencloudeu/opencloud-rolling:daily \
            -c "opencloud init || true && opencloud server"
      - name: Wait for OpenCloud to be ready
        run: |
          for i in $(seq 1 60); do
            curl -fsku admin:admin "https://localhost:19200/ocs/v1.php/cloud/capabilities?format=json" >/dev/null \
              && echo "OpenCloud is up" && exit 0
            echo "waiting for OpenCloud... ($i)"
            sleep 3
          done
          echo "OpenCloud did not become ready in time"
          docker logs opencloud
          exit 1
      - name: Install dependencies
        run: pnpm install
      - name: Run integration tests
        env:
          OCS_BASE_URL: https://localhost:19200
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: pnpm test:integration:wat
      - name: Stop OpenCloud backend
        if: always()
        run: docker rm -f opencloud || true

  e2e:
    if: false
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: pnpm install
      - name: Run E2E tests for chromium
        run: pnpm test:e2e:wat:chromium 'tests/e2e/cucumber/**/*.feature'
      - name: Run E2E tests for firefox
        run: pnpm test:e2e:wat:firefox 'tests/e2e/cucumber/**/*.feature'
      - name: Run E2E tests for webkit
        run: pnpm test:e2e:wat:webkit 'tests/e2e/cucumber/**/*.feature'

  load:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Make healthcheck-wait.sh script executable
        run: chmod +x tests/healthcheck-wait.sh
      - name: Start stack
        run: docker compose up opencloud -d
      - name: Wait for stack health
        run: tests/healthcheck-wait.sh
      - name: Make preparation scripts executable
        run: chmod -R +x tests/load/scripts/
      - name: Prepare for get-file load test
        run: tests/load/scripts/prepare-get-file.sh
      - name: Run load test get-file.js
        run: k6 run tests/load/get-file.js
      - name: Stop stack
        run: docker compose down
